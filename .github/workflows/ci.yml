name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Byte-compile (syntax gate)
        run: python -m compileall -q main.py run_bot.py train_models.py run_backtest.py src

      - name: Run test suite
        # Light tests (sizing, cards) always run; the heavy serve-path tests
        # skip gracefully when config/.env or live parquet data are absent.
        run: pytest -q
